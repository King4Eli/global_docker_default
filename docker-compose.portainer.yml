name: global_apps
services:
  global_portainer:
    image: portainer/portainer-ce:latest
    container_name: global_portainer
    restart: unless-stopped
    expose:
      - "8000"
      - "9000"
      - "9443"
    networks:
      - shared-global-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
networks:
  shared-global-network:
    external: true